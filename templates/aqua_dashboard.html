<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>EcoGrow | Aqua OS</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Plus+Jakarta+Sans:wght@300;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root {
    --bg-deep: #02060a;
    --meta-blue: #00d4ff;
    --meta-cyan: #00fff2;
    --glass: rgba(10, 20, 35, 0.7);
    --glass-border: rgba(0, 212, 255, 0.2);
}

* { margin:0; padding:0; box-sizing:border-box; font-family: 'Plus Jakarta Sans', sans-serif; }

body {
    background: var(--bg-deep);
    color: white;
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
    background-image: 
        radial-gradient(circle at var(--x, 50%) var(--y, 50%), rgba(0, 212, 255, 0.15) 0%, transparent 60%),
        linear-gradient(rgba(0, 212, 255, 0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 212, 255, 0.05) 1px, transparent 1px);
    background-size: 100% 100%, 50px 50px, 50px 50px;
}

.spore {
    position: absolute; width: 4px; height: 4px;
    background: var(--meta-blue); border-radius: 50%;
    filter: blur(2px) drop-shadow(0 0 8px var(--meta-blue));
    animation: floatUp 12s infinite linear; pointer-events: none; z-index: 0;
}
@keyframes floatUp { 0% { transform: translateY(105vh) scale(0); opacity: 0; } 50% { opacity: 0.8; } 100% { transform: translateY(-10vh) scale(2); opacity: 0; } }

.app { max-width: 450px; margin: auto; padding: 25px; padding-bottom: 110px; position: relative; z-index: 10; }

header { display: flex; justify-content: space-between; align-items: center; padding: 20px 0; }
.logo-mini { width: 55px; height: 55px; border-radius: 50%; border: 2px solid var(--meta-blue); padding: 3px; filter: drop-shadow(0 0 10px var(--meta-blue)); }

.card {
    background: var(--glass); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
    border: 1px solid var(--glass-border); border-radius: 30px; 
    padding: 24px; margin-bottom: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

.label { font-size: 11px; color: var(--meta-cyan); letter-spacing: 3px; text-transform: uppercase; margin-bottom: 15px; display: block; font-weight: 800; }
.value { font-family: 'Orbitron'; font-size: 38px; font-weight: 900; color: #fff; }

.circle-gauge {
    width: 80px; height: 80px; border-radius: 50%; margin: 0 auto 10px;
    background: #1a1a1a;
    mask: radial-gradient(transparent 58%, black 63%); -webkit-mask: radial-gradient(transparent 58%, black 63%);
    transition: 0.5s;
}

.bottom-nav {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    width: 90%; max-width: 400px; background: rgba(0, 5, 15, 0.95); backdrop-filter: blur(30px);
    border: 1px solid var(--glass-border); border-radius: 30px; height: 75px;
    display: flex; justify-content: space-around; align-items: center; z-index: 1000;
}
.bottom-nav a { color: rgba(255,255,255,0.2); font-size: 24px; transition: 0.4s; text-decoration: none; }
.bottom-nav a.active { color: var(--meta-blue); filter: drop-shadow(0 0 15px var(--meta-blue)); }

.status-pill { font-size: 9px; font-weight: 900; color: var(--meta-cyan); margin-top: 5px; text-transform: uppercase; }
</style>
</head>

<body>
<div id="spore-container"></div>

<div class="app">
    <header>
        <img src="{{ url_for('static', filename='images/ecogrow_logo.png') }}" class="logo-mini">
        <div style="font-family: 'Orbitron'; font-size: 20px; letter-spacing: 4px;">AQUA <span style="color:var(--meta-blue)">OS</span></div>
        <i class="fa-solid fa-droplet" style="color:var(--meta-blue); font-size: 20px;"></i>
    </header>

    <div class="card">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <div style="text-align: center; flex: 1;">
                <span class="label">Water Temp</span>
                <div class="value"><span id="temp">0</span><span style="font-size:18px">°C</span></div>
            </div>
            <div style="width: 1px; height: 50px; background: rgba(255,255,255,0.1);"></div>
            <div style="text-align: center; flex: 1;">
                <span class="label">pH Level</span>
                <div class="value"><span id="ph">0.0</span></div>
            </div>
        </div>
    </div>

    <div class="card">
        <span class="label">Aquatic Environment Sensors</span>
        <div style="display: flex; justify-content: space-around; margin-bottom: 10px;">
            <div style="text-align: center;">
                <div id="turb-gauge" class="circle-gauge"></div>
                <div style="font-family: 'Orbitron'; font-size: 18px; font-weight: 800;"><span id="turbidity">0</span></div>
                <div class="status-pill">Turbidity</div>
            </div>
            <div style="text-align: center;">
                <div id="water-gauge" class="circle-gauge"></div>
                <div style="font-family: 'Orbitron'; font-size: 18px; font-weight: 800;"><span id="water-level">0</span></div>
                <div class="status-pill">Water Level</div>
            </div>
        </div>
    </div>

    <div class="card" id="feed-card" style="display: flex; justify-content: space-between; align-items: center; border-left: 4px solid var(--meta-blue);">
        <div>
            <span class="label">Auto-Feeder Registry</span>
            <div class="value" id="feed-status" style="font-size: 24px;">IDLE</div>
            <div id="feed-msg" style="font-size: 10px; font-weight: 900; margin-top: 8px; color: var(--meta-cyan);">SYSTEM READY</div>
        </div>
        <i class="fa-solid fa-shrimp" id="shrimp-icon" style="font-size: 40px; color: var(--meta-blue); opacity: 0.5;"></i>
    </div>

    <div class="card">
        <span class="label">Live pH Stability Pulse</span>
        <canvas id="aquaChart" height="180"></canvas>
    </div>
</div>

<nav class="bottom-nav">
    <a href="/aqua-dashboard" class="active"><i class="fa-solid fa-house-signal"></i></a>
    <a href="/community"><i class="fa-solid fa-people-roof"></i></a>
    <a href="/reports"><i class="fa-solid fa-chart-pie"></i></a>
    <a href="/profile"><i class="fa-solid fa-user-astronaut"></i></a>
</nav>

<script>
    // Visual Parallax
    window.addEventListener('mousemove', (e) => {
        document.body.style.setProperty('--x', (e.clientX / window.innerWidth) * 100 + '%');
        document.body.style.setProperty('--y', (e.clientY / window.innerHeight) * 100 + '%');
    });

    const container = document.getElementById('spore-container');
    for (let i = 0; i < 20; i++) {
        const spore = document.createElement('div');
        spore.className = 'spore';
        spore.style.left = Math.random() * 100 + 'vw';
        spore.style.animationDelay = Math.random() * 10 + 's';
        container.appendChild(spore);
    }

    // Chart Setup
    const ctx = document.getElementById('aquaChart').getContext('2d');
    const aquaChart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: Array(12).fill(''),
            datasets: [{
                data: Array(12).fill(7.0),
                borderColor: '#00d4ff',
                backgroundColor: 'rgba(0, 212, 255, 0.1)',
                fill: true, tension: 0.5, pointRadius: 0
            }]
        },
        options: { plugins: { legend: { display: false } }, scales: { x: { display: false }, y: { min: 0, max: 14, ticks: { color: 'rgba(255,255,255,0.3)' } } } }
    });

    function updateUI() {
        // FIXED: Using the Smart /dashboard-data route
        $.getJSON("/dashboard-data", res => {
            if (res && res.data) {
                const d = res.data;
                
                // Update Text Metrics
                $("#temp").text(d["Temp (°C)"] || "0");
                $("#ph").text(d["pH"] || "0.0");
                $("#turbidity").text(d["Turbidity"] || "0");
                $("#water-level").text(d["Water_Level"] || "0");
                $("#feed-status").text(d["Feed"] || "OFF");

                // Update Progress Gauges
                let tPerc = (parseFloat(d["Turbidity"]) / 1000) * 100;
                let wPerc = (parseFloat(d["Water_Level"]) / 100) * 100;
                $("#turb-gauge").css('background', `conic-gradient(var(--meta-blue) ${tPerc}%, #1a1a1a ${tPerc}%)`);
                $("#water-gauge").css('background', `conic-gradient(var(--meta-blue) ${wPerc}%, #1a1a1a ${wPerc}%)`);

                // Update Feeder Visuals
                if (d["Feed"] === "DISPENSED") {
                    $("#feed-msg").text("FEEDING IN PROGRESS").css("color", "var(--meta-cyan)");
                    $("#shrimp-icon").addClass("fa-bounce").css("opacity", "1");
                } else {
                    $("#feed-msg").text("SYSTEM READY").css("color", "rgba(255,255,255,0.5)");
                    $("#shrimp-icon").removeClass("fa-bounce").css("opacity", "0.5");
                }

                // Push to Chart
                if (d["pH"]) {
                    aquaChart.data.datasets[0].data.shift();
                    aquaChart.data.datasets[0].data.push(parseFloat(d["pH"]));
                    aquaChart.update();
                }
            }
        });
    }

    // 1-Second Precision Refresh
    setInterval(updateUI, 1000);
</script>
</body>
</html>
