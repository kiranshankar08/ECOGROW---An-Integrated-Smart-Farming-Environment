<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login | ECOGROW OS</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Plus+Jakarta+Sans:wght@300;500;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
:root {
    --bg-deep: #030805;
    --meta-green: #00ff88;
    --meta-blue: #00d4ff;
    --glass: rgba(0, 20, 10, 0.4);
}

body {
    background-color: var(--bg-deep);
    background-image: 
        radial-gradient(circle at var(--x, 50%) var(--y, 50%), rgba(0, 255, 136, 0.18) 0%, transparent 50%),
        linear-gradient(rgba(0, 255, 136, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0, 255, 136, 0.03) 1px, transparent 1px);
    background-size: 100% 100%, 60px 60px, 60px 60px;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Plus Jakarta Sans', sans-serif;
    color: white;
    overflow: hidden;
    transition: background 0.1s ease;
}

/* --- GREENERY EFFECT --- */
.leaf {
    position: absolute;
    color: rgba(0, 255, 136, 0.2);
    font-size: 24px;
    user-select: none;
    pointer-events: none;
    animation: float 15s linear infinite;
    z-index: 1;
}

@keyframes float {
    0% { transform: translateY(110vh) translateX(0) rotate(0deg); opacity: 0; }
    10% { opacity: 0.8; }
    90% { opacity: 0.8; }
    100% { transform: translateY(-10vh) translateX(100px) rotate(360deg); opacity: 0; }
}

.login-card {
    background: var(--glass);
    backdrop-filter: blur(30px);
    -webkit-backdrop-filter: blur(30px);
    border: 1px solid rgba(0, 255, 136, 0.2);
    border-radius: 35px;
    padding: 45px;
    width: 90%;
    max-width: 420px;
    box-shadow: 0 0 60px rgba(0,0,0,0.8), inset 0 0 20px rgba(0, 255, 136, 0.1);
    text-align: center;
    position: relative;
    z-index: 10;
}

/* --- LOGO GREEN/BLACK FILTER --- */
.logo-container {
    width: 110px;
    height: 110px;
    margin: 0 auto 30px;
    position: relative;
    border-radius: 50%;
    background: #000;
    padding: 4px;
    box-shadow: 0 0 35px rgba(0, 255, 136, 0.5);
    border: 2px solid var(--meta-green);
}

.logo-container img {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    object-fit: cover;
    /* Strict Green/Black Filter Logic */
    filter: grayscale(100%) brightness(0.9) sepia(1) hue-rotate(90deg) saturate(1000%) contrast(1.4);
}

.logo-container::after {
    content: '';
    position: absolute;
    inset: -10px;
    border: 2px solid var(--meta-green);
    border-radius: 50%;
    animation: orbit 4s linear infinite;
    opacity: 0.6;
}

@keyframes orbit {
    0% { transform: rotate(0deg); clip-path: inset(0 0 80% 0); }
    100% { transform: rotate(360deg); clip-path: inset(0 0 80% 0); }
}

h2 {
    font-family: 'Orbitron', sans-serif;
    letter-spacing: 6px;
    font-weight: 900;
    font-size: 28px;
    margin-bottom: 35px;
    color: var(--meta-green);
    text-shadow: 0 0 15px rgba(0, 255, 136, 0.5);
}

.form-control {
    background: rgba(0, 40, 20, 0.4);
    border: 1px solid rgba(0, 255, 136, 0.2);
    border-radius: 18px;
    color: white;
    padding: 16px 22px;
    margin-bottom: 25px;
    transition: 0.3s;
}

.form-control:focus {
    background: rgba(0, 60, 30, 0.6);
    border-color: var(--meta-green);
    box-shadow: 0 0 25px rgba(0, 255, 136, 0.3);
    color: white;
}

.btn-login {
    background: linear-gradient(135deg, #004d2c, var(--meta-green));
    color: #000;
    border: none;
    border-radius: 18px;
    width: 100%;
    padding: 18px;
    font-weight: 900;
    font-family: 'Orbitron', sans-serif;
    letter-spacing: 3px;
    text-transform: uppercase;
    transition: 0.5s;
    cursor: pointer;
    box-shadow: 0 10px 20px rgba(0, 0, 0, 0.4);
}

.btn-login:hover {
    transform: translateY(-8px);
    box-shadow: 0 20px 40px rgba(0, 255, 136, 0.4);
    filter: brightness(1.2);
}

.error-msg {
    color: #ff3e3e;
    background: rgba(255, 62, 62, 0.15);
    padding: 14px;
    border-radius: 12px;
    font-size: 14px;
    margin-bottom: 25px;
    border: 1px solid rgba(255, 62, 62, 0.3);
}

.footer-text {
    margin-top: 35px;
    font-size: 11px;
    color: var(--meta-green);
    opacity: 0.6;
    letter-spacing: 3px;
    font-family: 'Orbitron';
}
</style>
</head>

<body>

<div id="greenery-container"></div>

<div class="login-card">
    <div class="logo-container">
        <img src="{{ url_for('static', filename='images/ecogrow_logo.png') }}" alt="EcoGrow OS">
    </div>

    <h2>ECOGROW</h2>

    {% if error %}
        <div class="error-msg">
            <i class="fa-solid fa-seedling"></i> {{ error }}
        </div>
    {% endif %}

    <form action="/" method="POST">
        <div class="position-relative">
            <input type="text" name="username" class="form-control" placeholder="NEURAL ID / USERNAME" required>
        </div>
        <div class="position-relative">
            <input type="password" name="password" class="form-control" placeholder="ACCESS KEY / PASSWORD" required>
        </div>
        <button type="submit" class="btn btn-login">Initialize Session</button>
    </form>

    <div class="footer-text">
        OS v2.0 // Node: K-Jayanti
    </div>
</div>

<script>
    // Metaverse Mouse Interaction
    const body = document.querySelector('body');
    window.addEventListener('mousemove', (e) => {
        const x = (e.clientX / window.innerWidth) * 100;
        const y = (e.clientY / window.innerHeight) * 100;
        body.style.setProperty('--x', x + '%');
        body.style.setProperty('--y', y + '%');
    });

    // Create floating leaves
    const container = document.getElementById('greenery-container');
    const leafIcons = ['fa-leaf', 'fa-seedling', 'fa-cannabis']; // Cannabis icon looks like a fan leaf, great for greenery effect
    
    for (let i = 0; i < 15; i++) {
        const leaf = document.createElement('i');
        const randomIcon = leafIcons[Math.floor(Math.random() * leafIcons.length)];
        leaf.className = `fa-solid ${randomIcon} leaf`;
        leaf.style.left = Math.random() * 100 + 'vw';
        leaf.style.animationDelay = Math.random() * 15 + 's';
        leaf.style.opacity = Math.random() * 0.5;
        container.appendChild(leaf);
    }
</script>

</body>
</html>
